server:
  port: 8080
  servlet:
    context-path: /api/${api.version}
  name: playlist

api:
  version: v1

spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop

  mail:
    host: localhost
    port: 25
    username: test@test.com
    password: test
    properties:
      mail:
        smtp:
          auth: false
          ssl:
            enable: false
            trust: localhost

  data:
    redis:
      port: 6379
      host: localhost
      password: test
      lettuce:
        pool:
          max-active: 10
          max-idle: 8
          min-idle: 5
          max-wait: 2000ms
      timeout: 50000

  jwt:
    secret: dGVzdC1zZWNyZXQta2V5LWZvci10ZXN0aW5nLW9ubHk9MTIzNDU2Nzg=
    access-token-expiration: 1800
    refresh-token-expiration: 1209600

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-google-client-id
            client-secret: test-google-client-secret
            redirect-uri: "http://127.0.0.1:8080/api/v1/login/oauth2/code/google"
            scope: profile,email
          spotify:
            client-id: test-spotify-client-id
            client-secret: test-spotify-client-secret
            redirect-uri: "http://127.0.0.1:8080/api/v1/login/oauth2/code/spotify"
            authorization-grant-type: authorization_code
            scope:
              - user-read-email
              - user-read-private
              - playlist-read-private
              - playlist-modify-public
              - playlist-modify-private
        provider:
          spotify:
            authorization-uri: https://accounts.spotify.com/authorize?show_dialog=true
            token-uri: https://accounts.spotify.com/api/token
            user-info-uri: https://api.spotify.com/v1/me
            user-name-attribute: id

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.example.playlist
  configuration:
    map-underscore-to-camel-case: true

gemini:
  api-key: test-gemini-api-key

swagger:
  server:
    url: http://localhost:8080/api/v1

spotify:
  client-id: test-spotify-client-id
  client-secret: test-spotify-client-secret

app:
  frontend-url: http://127.0.0.1:5173