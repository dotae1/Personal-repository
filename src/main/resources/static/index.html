<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Playlist Generator</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
        }

        header {
            background: #111;
            border-bottom: 1px solid #222;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .logo { font-size: 20px; font-weight: 700; color: #1DB954; letter-spacing: -0.5px; }

        .user-area { display: flex; align-items: center; gap: 12px; font-size: 14px; color: #aaa; }

        .btn-logout {
            background: transparent;
            border: 1px solid #444;
            color: #aaa;
            padding: 7px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
        }
        .btn-logout:hover { border-color: #888; color: #fff; }

        main { max-width: 760px; margin: 0 auto; padding: 48px 24px; }

        /* 비로그인 */
        #login-section { text-align: center; padding: 100px 0; }
        #login-section h2 { font-size: 32px; font-weight: 700; margin-bottom: 14px; line-height: 1.3; }
        #login-section p { color: #777; font-size: 16px; line-height: 1.7; margin-bottom: 36px; }
        .btn-spotify {
            display: inline-block;
            background: #1DB954;
            color: #000;
            font-weight: 700;
            font-size: 15px;
            padding: 14px 32px;
            border-radius: 30px;
            text-decoration: none;
            transition: transform 0.1s;
        }
        .btn-spotify:hover { transform: scale(1.03); }

        /* 로그인 후 */
        #app-section { display: none; }

        .create-card {
            background: #111;
            border: 1px solid #222;
            border-radius: 16px;
            padding: 28px;
            margin-bottom: 36px;
        }
        .create-card h2 { font-size: 18px; font-weight: 600; margin-bottom: 16px; }

        textarea {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #2e2e2e;
            color: #fff;
            border-radius: 10px;
            padding: 14px;
            font-size: 15px;
            font-family: inherit;
            resize: vertical;
            min-height: 88px;
            transition: border-color 0.2s;
        }
        textarea::placeholder { color: #555; }
        textarea:focus { outline: none; border-color: #1DB954; }

        .create-btn {
            width: 100%;
            margin-top: 14px;
            padding: 14px;
            background: #1DB954;
            color: #000;
            font-size: 15px;
            font-weight: 700;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .create-btn:hover { opacity: 0.9; }
        .create-btn:disabled { background: #2a2a2a; color: #555; cursor: not-allowed; opacity: 1; }

        .toast {
            margin-top: 14px;
            padding: 14px 16px;
            border-radius: 10px;
            font-size: 14px;
            line-height: 1.6;
            display: none;
        }
        .toast.success { background: #0d2e17; border: 1px solid #1DB954; color: #aef0c3; }
        .toast.error   { background: #2e0d0d; border: 1px solid #f44; color: #f9a8a8; }
        .toast a { color: #1DB954; text-decoration: none; font-weight: 600; }

        /* 플레이리스트 목록 */
        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .playlist-card {
            background: #111;
            border: 1px solid #222;
            border-radius: 12px;
            padding: 18px 20px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
        }
        .playlist-card:hover { border-color: #333; }
        .playlist-name { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
        .playlist-prompt { font-size: 13px; color: #666; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; max-width: 400px; }

        .btn-open {
            flex-shrink: 0;
            background: #1DB954;
            color: #000;
            font-size: 13px;
            font-weight: 700;
            padding: 8px 16px;
            border-radius: 20px;
            text-decoration: none;
            white-space: nowrap;
        }
        .btn-open:hover { opacity: 0.85; }

        .state-msg { text-align: center; color: #444; padding: 40px 0; font-size: 15px; line-height: 1.7; }
    </style>
</head>
<body>

<header>
    <div class="logo">AI Playlist</div>
    <div id="user-area" class="user-area" style="display:none">
        <span id="user-name"></span>
        <button class="btn-logout" onclick="logout()">로그아웃</button>
    </div>
</header>

<main>

    <!-- 비로그인 -->
    <section id="login-section">
        <h2>기분을 말하면 AI가<br>플레이리스트를 만들어요</h2>
        <p>원하는 분위기나 상황을 입력하면<br>Gemini가 10곡을 추천하고 Spotify 플레이리스트를 자동 생성해줘요.</p>
        <a href="/oauth2/authorization/spotify" class="btn-spotify">Spotify로 시작하기</a>
    </section>

    <!-- 로그인 후 -->
    <section id="app-section">

        <div class="create-card">
            <h2>어떤 음악을 듣고 싶으세요?</h2>
            <textarea id="prompt-input"
                      placeholder="예: 비 오는 날 듣기 좋은 감성 노래&#10;운동할 때 신나는 곡&#10;새벽에 혼자 듣는 잔잔한 음악"></textarea>
            <button class="create-btn" id="create-btn" onclick="createPlaylist()">플레이리스트 생성</button>
            <div id="result-toast" class="toast success"></div>
            <div id="error-toast" class="toast error"></div>
        </div>

        <div>
            <div class="section-title">내 플레이리스트</div>
            <div id="playlist-list"><div class="state-msg">불러오는 중...</div></div>
        </div>

    </section>

</main>

<script>
    async function init() {
        const res = await fetch('/api/me');
        const data = await res.json();

        if (data.authenticated) {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('app-section').style.display = 'block';
            document.getElementById('user-area').style.display = 'flex';
            document.getElementById('user-name').textContent = data.displayName !== 'null' ? data.displayName : data.spotifyId;
            loadPlaylists();
        }
    }

    async function loadPlaylists() {
        const list = document.getElementById('playlist-list');
        try {
            const res = await fetch('/api/playlists/me');
            if (!res.ok) throw new Error();
            const playlists = await res.json();

            if (playlists.length === 0) {
                list.innerHTML = '<div class="state-msg">아직 만든 플레이리스트가 없어요.<br>위에서 첫 번째 플레이리스트를 만들어보세요!</div>';
                return;
            }

            list.innerHTML = playlists.map(p => `
                <div class="playlist-card">
                    <div style="min-width:0">
                        <div class="playlist-name">${esc(p.name)}</div>
                        <div class="playlist-prompt">${esc(p.prompt)}</div>
                    </div>
                    <a class="btn-open"
                       href="https://open.spotify.com/playlist/${esc(p.spotifyPlaylistId)}"
                       target="_blank">Spotify 열기</a>
                </div>
            `).join('');
        } catch {
            list.innerHTML = '<div class="state-msg">플레이리스트를 불러오지 못했어요.</div>';
        }
    }

    async function createPlaylist() {
        const prompt = document.getElementById('prompt-input').value.trim();
        if (!prompt) return;

        const btn = document.getElementById('create-btn');
        const resultToast = document.getElementById('result-toast');
        const errorToast = document.getElementById('error-toast');

        btn.disabled = true;
        btn.textContent = 'AI가 곡을 추천하는 중... (약 10~20초)';
        resultToast.style.display = 'none';
        errorToast.style.display = 'none';

        try {
            const res = await fetch('/api/playlists', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt })
            });

            if (!res.ok) {
                const text = await res.text();
                throw new Error(text);
            }

            const data = await res.json();
            resultToast.style.display = 'block';
            resultToast.innerHTML = `
                ✅ <strong>${esc(data.name)}</strong> 생성 완료!
                ${data.songs ? `(${data.songs.length}곡)` : ''}
                &nbsp;&nbsp;<a href="${esc(data.spotifyUrl)}" target="_blank">Spotify에서 열기 →</a>
            `;
            document.getElementById('prompt-input').value = '';
            loadPlaylists();
        } catch (e) {
            errorToast.style.display = 'block';
            errorToast.textContent = '❌ 오류가 발생했어요. 잠시 후 다시 시도해주세요.';
            console.error(e);
        } finally {
            btn.disabled = false;
            btn.textContent = '플레이리스트 생성';
        }
    }

    function logout() {
        window.location.href = '/logout';
    }

    function esc(str) {
        return String(str ?? '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    init();
</script>
</body>
</html>
