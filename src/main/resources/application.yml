server:
  port: 8080
  servlet:
    context-path: /api/${api.version}
  name: playlist

api:
  version: v1

spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  mail:
    host: ${SMTP_HOST}
    port: ${SMTP_PORT}
    username: ${SMTP_USERNAME}
    password: ${SMTP_PASSWORD} #어플리케이션 비밀번호 발급받아서 주입
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
            trust: smtp.naver.com
  data:
    redis:
      port: ${REDIS_PORT}
      host: ${REDIS_HOST}
      password: ${REDIS_PASSWORD}
      lettuce:
        pool:
          max-active: 10
          max-idle: 8
          min-idle: 5
          max-wait: 2000ms
      timeout: 50000

  jwt:
    secret: ${JWT_SECRET_KEY}
    access-token-expiration: 1800       # 30분 (초)
    refresh-token-expiration: 1209600   # 14일 (초)


